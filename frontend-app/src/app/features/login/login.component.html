<div class="login-page">

  <div class="login-card">

    <div class="login-header">
      <p class="eyebrow">Parking Management</p>
      <h1>Sign in</h1>
      <p class="subtitle">
        Access your dashboard and manage your parking reservations.
      </p>
    </div>

    @if (error()) {
      <div class="message error">{{ error() }}</div>
    }

    <form (submit)="submit(); $event.preventDefault()" class="login-form">

      <div class="field">
        <label>Email</label>
        <input
          type="email"
          placeholder="your@email.com"
          [(ngModel)]="email"
          name="email"
          required
        />
      </div>

      <div class="field">
        <label>Password</label>
        <input
          type="password"
          placeholder="••••••••"
          [(ngModel)]="password"
          name="password"
          required
        />
      </div>

      <button
        class="btn btn-primary login-btn"
        type="submit"
        [disabled]="loading()"
      >
        {{ loading() ? 'Signing in...' : 'Login' }}
      </button>

    </form>

  </div>

</div>
