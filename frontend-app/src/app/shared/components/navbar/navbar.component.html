<nav class="navbar">
  <div class="navbar-inner container">
    <a routerLink="/" class="brand">Parking Management</a>

    @if (isAuthenticated()) {
      <div class="links">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Employee</a>

        @if (canSeeAdmin()) {
          <a routerLink="/admin" routerLinkActive="active">Admin</a>
        }

        @if (canSeeManager()) {
          <a routerLink="/manager" routerLinkActive="active">Manager</a>
        }
      </div>

      <div class="user-box">
        <span>{{ email() }}</span>
        <span class="role">{{ role() }}</span>
        <button class="btn btn-outline" (click)="logout()">Logout</button>
      </div>
    } @else {
      <div class="links">
        <a routerLink="/login" routerLinkActive="active">Login</a>
      </div>
    }
  </div>
</nav>
