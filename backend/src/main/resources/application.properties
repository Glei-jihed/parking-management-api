spring.application.name=backend

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/parking_management}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:parking_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:parking_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

app.jwt.secret=${APP_JWT_SECRET:1234567890123456789012345678901234567890123456789012345678901234}
app.jwt.expiration-hours=24